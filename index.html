<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sasso Carta Forbici vs AI</title>

  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.3.1/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8/dist/teachablemachine-image.min.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 20px;
      background: #f7f7f7;
      margin: 0;
    }

    h1 {
      margin: 10px 0 16px 0;
      font-size: 32px;
    }

    button {
      font-size: 18px;
      padding: 12px 20px;
      margin: 12px;
      border: none;
      border-radius: 10px;
      background: #222;
      color: white;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    video {
      width: 90vw;
      max-width: 320px;
      border-radius: 14px;
      background: #000;
      margin-top: 10px;
    }

    .panel {
      margin: 16px auto;
      max-width: 460px;
      background: white;
      border-radius: 14px;
      padding: 18px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }

    .big {
      font-size: 28px;
      font-weight: bold;
      margin: 12px 0;
    }

    .player {
      color: #1565c0;
    }

    .ai {
      color: #c62828;
    }

    .result-win {
      color: #2e7d32;
    }

    .result-lose {
      color: #d84315;
    }

    .result-draw {
      color: #6a1b9a;
    }

    #countdown {
      font-size: 42px;
      font-weight: bold;
      margin: 12px 0;
      color: #111;
      min-height: 50px;
    }

    #status {
      margin-top: 10px;
      font-size: 18px;
      color: #444;
      min-height: 24px;
    }

    #score {
      font-size: 22px;
      font-weight: bold;
      margin-top: 10px;
    }

    .hint {
      font-size: 15px;
      color: #666;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <h1>Sasso Carta Forbici vs AI</h1>

  <button id="startBtn">Avvia fotocamera</button>

  <div>
    <video id="video" autoplay playsinline muted></video>
  </div>

  <div class="panel">
    <div id="countdown">Premi "Avvia fotocamera"</div>
    <div class="big player" id="player">Tu: —</div>
    <div class="big ai" id="ai">AI: —</div>
    <div class="big" id="result">Risultato: —</div>
    <div id="score">Punteggio — Tu: 0 | AI: 0</div>
    <div id="status">Pronto</div>
    <div class="hint">Tieni la mano ben visibile quando compare "VIA!"</div>
  </div>

  <script>
    const URL = "https://teachablemachine.withgoogle.com/models/mwIUnQ1HC/";

    let model;
    let video;
    let running = false;
    let roundLocked = false;

    let playerScore = 0;
    let aiScore = 0;

    function randomMove() {
      const moves = ["Sasso", "Carta", "Forbici"];
      return moves[Math.floor(Math.random() * 3)];
    }

    function winner(player, ai) {
      if (player === ai) {
        return "Pareggio";
      }

      if (
        (player === "Sasso" && ai === "Forbici") ||
        (player === "Carta" && ai === "Sasso") ||
        (player === "Forbici" && ai === "Carta")
      ) {
        return "Hai vinto";
      }

      return "Ha vinto l'AI";
    }

    function emoji(move) {
      if (move === "Sasso") return "✊";
      if (move === "Carta") return "✋";
      if (move === "Forbici") return "✌️";
      return "";
    }

    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    function setResultStyle(text) {
      const resultEl = document.getElementById("result");
      resultEl.classList.remove("result-win", "result-lose", "result-draw");

      if (text === "Hai vinto") {
        resultEl.classList.add("result-win");
      } else if (text === "Ha vinto l'AI") {
        resultEl.classList.add("result-lose");
      } else if (text === "Pareggio") {
        resultEl.classList.add("result-draw");
      }
    }

    function updateScore() {
      document.getElementById("score").textContent =
        `Punteggio — Tu: ${playerScore} | AI: ${aiScore}`;
    }

    async function init() {
      const status = document.getElementById("status");
      const startBtn = document.getElementById("startBtn");
      video = document.getElementById("video");

      try {
        startBtn.disabled = true;
        status.textContent = "Carico il modello...";

        const modelURL = URL + "model.json";
        const metadataURL = URL + "metadata.json";
        model = await tmImage.load(modelURL, metadataURL);

        status.textContent = "Richiedo accesso alla fotocamera...";

        const stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: "user",
            width: { ideal: 320 },
            height: { ideal: 320 }
          },
          audio: false
        });

        video.srcObject = stream;

        await new Promise((resolve) => {
          video.onloadedmetadata = () => resolve();
        });

        await video.play();

        running = true;
        status.textContent = "Fotocamera attiva";
        gameLoop();

      } catch (err) {
        console.error(err);
        status.textContent = "Errore: " + (err.message || err);
        startBtn.disabled = false;
      }
    }

    async function getBestPrediction() {
      const prediction = await model.predict(video);
      let best = prediction[0];

      for (const p of prediction) {
        if (p.probability > best.probability) {
          best = p;
        }
      }

      return best;
    }

    async function captureStableMove() {
      let counts = {
        "Sasso": 0,
        "Carta": 0,
        "Forbici": 0
      };

      for (let i = 0; i < 8; i++) {
        const best = await getBestPrediction();

        if (best.probability > 0.70 && counts.hasOwnProperty(best.className)) {
          counts[best.className]++;
        }

        await sleep(120);
      }

      let bestMove = "Nessuno";
      let bestCount = 0;

      for (const move in counts) {
        if (counts[move] > bestCount) {
          bestCount = counts[move];
          bestMove = move;
        }
      }

      if (bestCount < 3) {
        return null;
      }

      return bestMove;
    }

    async function playRound() {
      if (!running || roundLocked) return;
      roundLocked = true;

      const countdownEl = document.getElementById("countdown");
      const status = document.getElementById("status");
      const resultEl = document.getElementById("result");

      countdownEl.textContent = "3";
      status.textContent = "Prepara la mano...";
      await sleep(800);

      countdownEl.textContent = "2";
      await sleep(800);

      countdownEl.textContent = "1";
      await sleep(800);

      countdownEl.textContent = "VIA!";
      status.textContent = "Mostra il tuo gesto";
      await sleep(500);

      const playerMove = await captureStableMove();

      if (!playerMove) {
        document.getElementById("player").textContent = "Tu: gesto non riconosciuto";
        document.getElementById("ai").textContent = "AI: —";
        resultEl.textContent = "Risultato: riprova";
        resultEl.classList.remove("result-win", "result-lose", "result-draw");
        countdownEl.textContent = "Riproviamo...";
        status.textContent = "Tieni la mano più ferma e ben visibile";
        await sleep(2200);
        roundLocked = false;
        return;
      }

      const aiMove = randomMove();
      const outcome = winner(playerMove, aiMove);

      document.getElementById("player").textContent =
        "Tu: " + emoji(playerMove) + " " + playerMove;

      document.getElementById("ai").textContent =
        "AI: " + emoji(aiMove) + " " + aiMove;

      resultEl.textContent = "Risultato: " + outcome;
      setResultStyle(outcome);

      if (outcome === "Hai vinto") {
        playerScore++;
      } else if (outcome === "Ha vinto l'AI") {
        aiScore++;
      }

      updateScore();

      countdownEl.textContent = "Turno finito";
      status.textContent = "Nuovo round tra poco...";
      await sleep(3000);

      roundLocked = false;
    }

    async function gameLoop() {
      while (running) {
        await playRound();
        await sleep(500);
      }
    }

    document.getElementById("startBtn").addEventListener("click", init);
  </script>
</body>
</html>
