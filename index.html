<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sasso Carta Forbice vs AI</title>

  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.3.1/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8/dist/teachablemachine-image.min.js"></script>

  <style>
    body {
      font-family: sans-serif;
      text-align: center;
      padding: 20px;
    }
    button {
      font-size: 18px;
      padding: 12px 20px;
      margin: 12px;
    }
    video {
      width: 90vw;
      max-width: 320px;
      border-radius: 12px;
      background: #000;
    }
    .big {
      font-size: 24px;
      margin: 10px 0;
    }
  </style>
</head>
<body>
  <h1>Sasso Carta Forbice vs AI</h1>
  <button id="startBtn">Avvia fotocamera</button>

  <div>
    <video id="video" autoplay playsinline muted></video>
  </div>

  <div class="big" id="player">Tu: —</div>
  <div class="big" id="ai">AI: —</div>
  <div class="big" id="result">Risultato: —</div>
  <div id="status">Pronto</div>

  <script>
    const URL = "https://teachablemachine.withgoogle.com/models/mwIUnQ1HC/";
    let model;
    let video;
    let running = false;
    let lastRound = 0;

    function randomMove() {
      const moves = ["Rock", "Paper", "Scissors"];
      return moves[Math.floor(Math.random() * 3)];
    }

    function winner(player, ai) {
      if (player === ai) return "Pareggio";
      if (
        (player === "Rock" && ai === "Scissors") ||
        (player === "Paper" && ai === "Rock") ||
        (player === "Scissors" && ai === "Paper")
      ) return "Hai vinto";
      return "Ha vinto l'AI";
    }

    async function init() {
      const status = document.getElementById("status");
      const startBtn = document.getElementById("startBtn");
      video = document.getElementById("video");

      try {
        startBtn.disabled = true;
        status.textContent = "Carico il modello...";

        const modelURL = URL + "model.json";
        const metadataURL = URL + "metadata.json";
        model = await tmImage.load(modelURL, metadataURL);

        status.textContent = "Richiedo accesso alla fotocamera...";

        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
          throw new Error("getUserMedia non supportato da questo browser");
        }

        const stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: "user",
            width: { ideal: 320 },
            height: { ideal: 320 }
          },
          audio: false
        });

        video.srcObject = stream;

        await new Promise((resolve) => {
          video.onloadedmetadata = () => resolve();
        });

        await video.play();

        running = true;
        status.textContent = "Fotocamera attiva";
        window.requestAnimationFrame(loop);

      } catch (err) {
        console.error(err);
        status.textContent = "Errore: " + (err.message || err);
        startBtn.disabled = false;
      }
    }

    async function loop() {
      if (!running) return;
      await predict();
      window.requestAnimationFrame(loop);
    }

    async function predict() {
      const prediction = await model.predict(video);
      let best = prediction[0];

      for (const p of prediction) {
        if (p.probability > best.probability) best = p;
      }

      const now = Date.now();

      if (best.probability > 0.85 && now - lastRound > 1500) {
        const playerMove = best.className;
        const aiMove = randomMove();

        document.getElementById("player").textContent = "Tu: " + playerMove;
        document.getElementById("ai").textContent = "AI: " + aiMove;
        document.getElementById("result").textContent =
          "Risultato: " + winner(playerMove, aiMove);

        lastRound = now;
      }
    }

    document.getElementById("startBtn").addEventListener("click", init);
  </script>
</body>
</html>
